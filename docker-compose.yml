version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: image-processor-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - UPLOAD_FOLDER=/data/uploads
      - PROCESSED_FOLDER=/data/processed
      - MAX_FILE_SIZE=10485760
      - ALLOWED_EXTENSIONS=jpg,jpeg,png,gif,webp
    volumes:
      - image-data:/data
    networks:
      - image-processor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: image-processor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - image-processor-net

volumes:
  image-data:
    driver: local

networks:
  image-processor-net:
    driver: bridge
